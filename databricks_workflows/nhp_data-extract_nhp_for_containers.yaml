resources:
  jobs:
    Extract_NHP_for_containers:
      name: Extract NHP for containers
      tasks:
        - task_key: run_extract_apc_data
          for_each_task:
            inputs: "{{job.parameters.years}}"
            task:
              task_key: extract_ip_data
              python_wheel_task:
                package_name: nhp_data
                entry_point: model_data-ip
                parameters:
                  - "{{job.parameters.data_version}}"
                  - "{{input}}"
              job_cluster_key: nhp_data
              libraries:
                - whl: ../dist/*.whl
        - task_key: run_extract_opa_data
          depends_on:
            - task_key: run_extract_apc_data
          for_each_task:
            inputs: "{{job.parameters.years}}"
            task:
              task_key: extract_op_data
              python_wheel_task:
                package_name: nhp_data
                entry_point: model_data-op
                parameters:
                  - "{{job.parameters.data_version}}"
                  - "{{input}}"
              job_cluster_key: nhp_data
              libraries:
                - whl: ../dist/*.whl
        - task_key: run_extract_ecds_data
          depends_on:
            - task_key: run_extract_opa_data
          for_each_task:
            inputs: "{{job.parameters.years}}"
            task:
              task_key: extract_aae_data
              python_wheel_task:
                package_name: nhp_data
                entry_point: model_data-aae
                parameters:
                  - "{{job.parameters.data_version}}"
                  - "{{input}}"
              job_cluster_key: nhp_data
              libraries:
                - whl: ../dist/*.whl
        - task_key: run_extract_demographic_factors_data
          depends_on:
            - task_key: run_extract_ecds_data
          for_each_task:
            inputs: "{{job.parameters.years}}"
            task:
              task_key: extract_demographic_factors_data
              python_wheel_task:
                package_name: nhp_data
                entry_point: model_data-demographic_factors
                parameters:
                  - "{{job.parameters.data_version}}"
                  - "{{input}}"
                  - "{{job.parameters.projection_year}}"
              job_cluster_key: nhp_data
              libraries:
                - whl: ../dist/*.whl
        - task_key: run_extract_birth_factors_data
          depends_on:
            - task_key: run_extract_demographic_factors_data
          for_each_task:
            inputs: "{{job.parameters.years}}"
            task:
              task_key: extract_birth_factors_data
              python_wheel_task:
                package_name: nhp_data
                entry_point: model_data-birth_factors
                parameters:
                  - "{{job.parameters.data_version}}"
                  - "{{input}}"
                  - "{{job.parameters.projection_year}}"
              job_cluster_key: nhp_data
              libraries:
                - whl: ../dist/*.whl
        - task_key: run_extract_inequalities_data
          depends_on:
            - task_key: run_extract_birth_factors_data
          for_each_task:
            inputs: "{{job.parameters.years}}"
            task:
              task_key: extract_inequalities_data
              python_wheel_task:
                package_name: nhp_data
                entry_point: model_data-inequalities
                parameters:
                  - "{{job.parameters.data_version}}"
                  - "{{input}}"
              job_cluster_key: nhp_data
              libraries:
                - whl: ../dist/*.whl
        - task_key: generate_provider_gams
          depends_on:
            - task_key: run_extract_inequalities_data
          python_wheel_task:
            package_name: nhp_data
            entry_point: model_data-health_status_adjustment-generate_provider_gams
            parameters:
              - "{{job.parameters.data_version}}"
          job_cluster_key: nhp_data
          libraries:
            - pypi:
                package: pygam==0.9.1
            - whl: ../dist/*.whl
        - task_key: generate_icb_gams
          depends_on:
            - task_key: generate_provider_gams
          python_wheel_task:
            package_name: nhp_data
            entry_point: model_data-health_status_adjustment-generate_icb_gams
            parameters:
              - "{{job.parameters.data_version}}"
          job_cluster_key: nhp_data
          libraries:
            - pypi:
                package: pygam==0.9.1
            - whl: ../dist/*.whl
        - task_key: generate_national_gams
          depends_on:
            - task_key: generate_icb_gams
          python_wheel_task:
            package_name: nhp_data
            entry_point: model_data-health_status_adjustment-generate_national_gams
            parameters:
              - "{{job.parameters.data_version}}"
          job_cluster_key: nhp_data
          libraries:
            - pypi:
                package: pygam==0.9.1
            - whl: ../dist/*.whl
        - task_key: generate_synthetic_data
          depends_on:
            - task_key: generate_national_gams
          for_each_task:
            inputs: "{{job.parameters.years}}"
            task:
              task_key: run_generate_synthetic_data
              python_wheel_task:
                package_name: nhp_data
                entry_point: model_data-generate_synthetic_data
                parameters:
                  - "{{input}}"
                  - "20251001"
              job_cluster_key: nhp_data
              libraries:
                - whl: ../dist/*.whl
        - task_key: clean_up
          depends_on:
            - task_key: generate_synthetic_data
          python_wheel_task:
            package_name: nhp_data
            entry_point: model_data-clean_up
            parameters:
              - "{{job.parameters.data_version}}"
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
        - task_key: move_data
          depends_on:
            - task_key: clean_up
          python_wheel_task:
            package_name: nhp_data
            entry_point: extract_data
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
      job_clusters:
        - job_cluster_key: nhp_data
          new_cluster:
            spark_version: 17.3.x-scala2.13
            spark_conf:
              spark.databricks.delta.properties.defaults.autoOptimize.optimizeWrite: "true"
              spark.databricks.delta.properties.defaults.autoOptimize.autoCompact: "true"
              spark.databricks.sql.initial.catalog.namespace: udal_lake_mart
            azure_attributes:
              availability: SPOT_WITH_FALLBACK_AZURE
              spot_bid_max_price: 100
            node_type_id: Standard_E16_v3
            custom_tags:
              Application: UDAL
              Workload_Type: Job
              Workload_Size: Small
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            policy_id: 000816B2986C0B29
            data_security_mode: USER_ISOLATION
            runtime_engine: STANDARD
            kind: CLASSIC_PREVIEW
            is_single_node: false
            num_workers: 1
      tags:
        group: nhp_data_model
        env: ${bundle.target}
      queue:
        enabled: true
      parameters:
        - name: data_version
          default: dev
        - name: years
          default: "[202324]"
        - name: projection_year
          default: "2022"
