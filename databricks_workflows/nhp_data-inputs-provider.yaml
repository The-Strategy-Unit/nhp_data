resources:
  jobs:
    Generate_NHP_Data_Inputs_provider:
      name: "Generate NHP Data (Inputs: Provider)"
      tasks:
        - task_key: run_inputs_data
          condition_task:
            op: EQUAL_TO
            left: "{{job.parameters.run_inputs_data}}"
            right: "True"
        - task_key: extract_age_sex
          depends_on:
            - task_key: run_inputs_data
              outcome: "true"
          python_wheel_task:
            package_name: nhp_data
            entry_point: inputs_data-age_sex
            parameters:
              - provider
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
        - task_key: extract_baseline
          depends_on:
            - task_key: extract_age_sex
          python_wheel_task:
            package_name: nhp_data
            entry_point: inputs_data-baseline
            parameters:
              - provider
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
        - task_key: extract_diagnoses
          depends_on:
            - task_key: extract_baseline
          python_wheel_task:
            package_name: nhp_data
            entry_point: inputs_data-diagnoses
            parameters:
              - provider
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
        - task_key: extract_procedures
          depends_on:
            - task_key: extract_diagnoses
          python_wheel_task:
            package_name: nhp_data
            entry_point: inputs_data-procedures
            parameters:
              - provider
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
        - task_key: extract_rates
          depends_on:
            - task_key: extract_procedures
          python_wheel_task:
            package_name: nhp_data
            entry_point: inputs_data-rates
            parameters:
              - provider
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
        - task_key: extract_expat_repat
          depends_on:
            - task_key: extract_rates
          python_wheel_task:
            package_name: nhp_data
            entry_point: inputs_data-expat_repat
            parameters:
              - provider
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
        - task_key: extract_inequalities
          depends_on:
            - task_key: extract_expat_repat
          python_wheel_task:
            package_name: nhp_data
            entry_point: inputs_data-inequalities
            parameters:
              - provider
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
      job_clusters:
        - job_cluster_key: nhp_data
          new_cluster:
            spark_version: 17.3.x-scala2.13
            spark_conf:
              spark.databricks.delta.properties.defaults.autoOptimize.optimizeWrite: "true"
              spark.databricks.delta.properties.defaults.autoOptimize.autoCompact: "true"
              spark.databricks.sql.initial.catalog.namespace: udal_lake_mart
            azure_attributes:
              availability: SPOT_WITH_FALLBACK_AZURE
              spot_bid_max_price: 100
            node_type_id: Standard_E16_v3
            custom_tags:
              Application: UDAL
              Workload_Type: Job
              Workload_Size: Small
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            policy_id: 000816B2986C0B29
            data_security_mode: USER_ISOLATION
            runtime_engine: STANDARD
            kind: CLASSIC_PREVIEW
            is_single_node: false
            num_workers: 1
      tags:
        group: nhp_data
        env: ${bundle.target}
      queue:
        enabled: true
      parameters:
        - name: run_inputs_data
          default: "True"
