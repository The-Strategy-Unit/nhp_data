resources:
  jobs:
    Generate_NHP_Data_IP:
      name: Generate NHP Data (IP)
      tasks:
        - task_key: run_ip
          condition_task:
            op: EQUAL_TO
            left: "{{job.parameters.run_ip}}"
            right: "True"
        - task_key: nhp-raw_data-apc
          depends_on:
            - task_key: run_ip
              outcome: "true"
          python_wheel_task:
            package_name: nhp_data
            entry_point: raw_data-inpatients
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
        - task_key: nhp-raw_data-apc_mitigators
          depends_on:
            - task_key: nhp-raw_data-apc
          python_wheel_task:
            package_name: nhp_data
            entry_point: raw_data-inpatients_mitigators
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
        - task_key: nhp-default-apc
          depends_on:
            - task_key: nhp-raw_data-apc_mitigators
          python_wheel_task:
            package_name: nhp_data
            entry_point: default-apc
          job_cluster_key: nhp_data
          libraries:
            - whl: ../dist/*.whl
      job_clusters:
        - job_cluster_key: nhp_data
          new_cluster:
            spark_version: 17.3.x-scala2.13
            spark_conf:
              spark.databricks.delta.properties.defaults.autoOptimize.optimizeWrite: "true"
              spark.databricks.delta.properties.defaults.autoOptimize.autoCompact: "true"
              spark.databricks.sql.initial.catalog.namespace: udal_lake_mart
            azure_attributes:
              availability: SPOT_WITH_FALLBACK_AZURE
              spot_bid_max_price: 100
            node_type_id: Standard_E16_v3
            custom_tags:
              Application: UDAL
              Workload_Type: Job
              Workload_Size: Small
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            policy_id: 000816B2986C0B29
            data_security_mode: USER_ISOLATION
            runtime_engine: STANDARD
            kind: CLASSIC_PREVIEW
            is_single_node: false
            num_workers: 1
      tags:
        group: nhp_data
        env: ${bundle.target}
      queue:
        enabled: true
      parameters:
        - name: run_ip
          default: "True"
