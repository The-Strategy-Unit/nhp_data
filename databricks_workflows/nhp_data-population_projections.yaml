resources:
  jobs:
    Generate_NHP_Data_Population_Data:
      name: Generate NHP Data (Population Data)
      tasks:
        - task_key: run_population_data
          condition_task:
            op: EQUAL_TO
            left: "{{job.parameters.run_population_data}}"
            right: "True"
        - task_key: download_and_extract_ons_files
          depends_on:
            - task_key: run_population_data
              outcome: "true"
          python_wheel_task:
            package_name: nhp_data
            entry_point: population_projections-get_ons_files_2022
            parameters:
              - "{{job.parameters.projection_year}}"
          job_cluster_key: nhp_data
          libraries:
            - pypi:
                package: beautifulsoup4
            - whl: ../dist/*.whl
        - task_key: subnational_population_projections
          depends_on:
            - task_key: download_and_extract_ons_files
          for_each_task:
            inputs: '["migration_category", "var_proj_5_year_migration",
              "var_proj_10_year_migration", "var_proj_high_intl_migration",
              "var_proj_low_intl_migration", "var_proj_zero_net_migration"]'
            task:
              task_key: subnational_population_projections_iteration
              python_wheel_task:
                package_name: nhp_data
                entry_point: population_projections-snpp
                parameters:
                  - "{{job.parameters.projection_year}}"
                  - "{{input}}"
              job_cluster_key: nhp_data
              libraries:
                - whl: ../dist/*.whl
        - task_key: national_population_projections
          depends_on:
            - task_key: subnational_population_projections
          for_each_task:
            inputs: '["hhh","hlh","hpp","lhl","lll","lpp","php","plp","pnp","pph","ppl","ppz","rpp"]'
            task:
              task_key: national_population_projections_iteration
              python_wheel_task:
                package_name: nhp_data
                entry_point: population_projections-npp
                parameters:
                  - "{{job.parameters.projection_year}}"
                  - "{{input}}"
              job_cluster_key: nhp_data
              libraries:
                - pypi:
                    package: xlrd
                - pypi:
                    package: openpyxl
                - whl: ../dist/*.whl
      job_clusters:
        - job_cluster_key: nhp_data
          new_cluster:
            spark_version: 17.3.x-scala2.13
            spark_conf:
              spark.databricks.delta.properties.defaults.autoOptimize.optimizeWrite: "true"
              spark.databricks.delta.properties.defaults.autoOptimize.autoCompact: "true"
              spark.databricks.sql.initial.catalog.namespace: udal_lake_mart
            azure_attributes:
              availability: SPOT_WITH_FALLBACK_AZURE
              spot_bid_max_price: 100
            node_type_id: Standard_DS3_v2
            custom_tags:
              Application: UDAL
              Workload_Type: Job
              Workload_Size: Small
            spark_env_vars:
              PYSPARK_PYTHON: /databricks/python3/bin/python3
            policy_id: 000816B2986C0B29
            data_security_mode: USER_ISOLATION
            runtime_engine: STANDARD
            kind: CLASSIC_PREVIEW
            is_single_node: false
            num_workers: 1
      tags:
        group: nhp_data
        env: ${bundle.target}
      queue:
        enabled: true
      parameters:
        - name: projection_year
          default: "2022"
        - name: run_population_data
          default: "True"
